							{ label: "19:30", text: "Farewell Dinner. Premium Sushi or Izakaya in the Kita district." }], 
						location: "Honmachi / Umeda"};

					else if (month === 3 && dayNum === 17) activity = { 
						title: "Head to Singapore", 
						details: [
							{ label: "10:00", text: "Final local walk. Grab snacks at Shinsekai Market or nearby." }, 
							{ label: "12:30", text: "Nankai Rap:t train to KIX. Direct express from Namba Station." }, 
							{ label: "15:50", text: "Flight Departure. Fly to Singapore from Kansai Airport." },
							{ label: "21:25", text: "Touchdown at Changi. Clear immigration & Grab/Taxi to The Clan." }, 
							{ label: "23:00", text: "Check-in at The Clan Hotel. Welcome tea & decompress." }, 
							{ label: "23:30", text: "Short stroll to Telok Ayer Street for the midnight vibe." }], 
						location: "Osaka / Singapore"};

					else if (month === 3 && dayNum === 18) activity = { 
						title: "Chinatown / Marina Bay Loop", 
						details: [
							{ label: "09:00", text: "Morning Pool Time. Rooftop swim at The Clan." },
							{ label: "11:30", text: "Maxwell Food Centre. Lunch: Tian Tian Chicken Rice & Sugarcane juice." }, 
							{ label: "13:00", text: "Chinatown Culture. Buddha Tooth Relic Temple & Ann Siang Hill." }, 
							{ label: "15:00", text: "Heat Retreat. Rest at hotel during peak UV hours." },
							{ label: "17:30", text: "Golden Hour Walk. Merlion Park to Helix Bridge." },
							{ label: "18:30", text: "Rooftop Drinks. CÉ LA VI or Spago at MBS for city lights." },
							{ label: "20:00", text: "Gardens by the Bay. Supertree Grove Light Show (Garden Rhapsody)." }], 
						location: "Chinatown / Marina Bay"};

					else if (month === 3 && dayNum === 19) activity = { 
						title: "Little India / Raffles / Satay Street", 
						details: [
							{ label: "09:00", text: "Slow Morning. Breakfast or final pool session." },
							{ label: "11:00", text: "Little India. Sri Veeramakaliamman Temple & Tekka Centre snacks." }, 
							{ label: "14:30", text: "Kampong Glam. Haji Lane murals & Sultan Mosque (shaded alleys)." }, 
							{ label: "18:00", text: "Raffles Long Bar. Iconic Singapore Sling (touristy but fun!)." }, 
							{ label: "19:30", text: "Satay Street. Dinner at Lau Pa Sat’s outdoor stalls (Boon Tat St)." }], 
						location: "Little India / Tanjong Pagar"};

					else if (month === 3 && dayNum === 20) activity = { 
						title: "River Walk / Jewel Finale", 
						details: [
							{ label: "09:30", text: "Coffee Crawl. Common Man Stan or Nylon Coffee near hotel." }, 
							{ label: "11:00", text: "River Walk. Scenic stroll from Boat Quay towards Clarke Quay." },
							{ label: "13:00", text: "Riverside Lunch. Relaxed meal by the water at Boat Quay." }, 
							{ label: "15:00", text: "Last Wander. Final souvenir shopping in Chinatown or Funan Mall." },
							{ label: "18:00", text: "Early Dinner. Light bite at Telok Ayer near the hotel." },
							{ label: "20:30", text: "Jewel Changi. See the Rain Vortex waterfall before the 22:40 flight." }], 
						location: "Tanjong Pagar / Changi"};
					
                    data[dateStr] = {
 flights,
 trains,
 tips,
                        hotel: hotelInfo ? { type: 'Hotel', title: hotelInfo.name, details: [`Address: ${hotelInfo.address}`], location: hotelInfo.location, icon: 'Hotel' } : null,
                        activity: activity ? { type: 'Activity', ...activity, icon: 'MapPin' } : null
                    };
                });
                return data;
            }, [days]);

            useEffect(() => {
                document.body.style.overflow = (selectedDay || selectedDetail) ? 'hidden' : 'auto';
            }, [selectedDay, selectedDetail]);

            
	const selectedDayIndex = selectedDay ? days.findIndex(d => dateKey(d) === dateKey(selectedDay.date)) : -1;
	const goToAdjacentDay = (direction) => {
		if (!selectedDay) return;
		const nextIndex = selectedDayIndex + direction;
		if (nextIndex < 0 || nextIndex >= days.length) return;
		const nextDate = days[nextIndex];
		setSelectedDay({ date: nextDate, data: tripData[dateKey(nextDate)] });
	};
	const handleTouchStart = (e) => { touchStartX.current = e.changedTouches[0].screenX; };
	const handleTouchEnd = (e) => {
		const endX = e.changedTouches[0].screenX;
		if (touchStartX.current === null) return;
		const diff = touchStartX.current - endX;
		if (Math.abs(diff) < 50) { touchStartX.current = null; return; }
		goToAdjacentDay(diff > 0 ? 1 : -1);
		touchStartX.current = null;
	};
return (
                <div className="min-h-screen pb-safe">
                    <div className="max-w-md mx-auto md:max-w-6xl">
                        <header className="px-5 pt-8 pb-4 bg-white sticky top-0 z-10 md:static">
                            <h1 className="text-2xl font-black tracking-tight text-indigo-950 flex items-center gap-2">
                                <Icon name="Calendar" className="text-indigo-600" size={24} />
                                L & P's Honeymoon
                            </h1>
                            <p className="text-slate-400 text-sm font-medium">Japan & Singapore 2026</p>
                        </header>

                        <div className="md:p-8 pt-0">
                            <div className="bg-white md:rounded-3xl md:shadow-2xl overflow-hidden md:border border-slate-200">
                                <div className="grid grid-cols-7 bg-indigo-950 text-white text-center py-3 text-[10px] font-black uppercase tracking-widest">
                                    {['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((day, i) => <div key={i}>{day}</div>)}
                                </div>
                                <div className="grid grid-cols-7 border-l border-t border-slate-100">
                                    {days.map((date) => {
                                        const dateStr = dateKey(date);
                                        const dayData = tripData[dateStr];
                                        return (
                                            <div key={dateStr} onClick={() => setSelectedDay({ date, data: dayData })} className={`min-h-[85px] md:min-h-[120px] p-1.5 border-r border-b border-slate-100 flex flex-col cursor-pointer active:bg-indigo-50 transition-colors ${date.getDay() === 0 || date.getDay() === 6 ? 'bg-slate-50/40' : ''}`}>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className={`text-xs font-black w-6 h-6 flex items-center justify-center rounded-full ${date.getMonth() === 3 ? 'text-indigo-600' : 'text-slate-300'}`}>{date.getDate()}</span>
                                                </div>
                                                <div className="flex flex-wrap gap-0.5 mt-auto">
                                                    {dayData?.flights && <div className="w-2 h-2 rounded-full bg-blue-500" />}
                                                    {dayData?.trains && <div className="w-2 h-2 rounded-full bg-blue-500" />}
                                                      {dayData?.hotel && <div className="w-2 h-2 rounded-full bg-orange-500" />}
                                                    {dayData?.activity && <div className="w-2 h-2 rounded-full bg-emerald-500" />}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Daily Overview Drawer */}
                    {selectedDay && !selectedDetail && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex flex-col justify-end transition-opacity animate-in fade-in">
                            <div className="absolute inset-0" onClick={() => setSelectedDay(null)} />
                            <div className="bg-white rounded-t-[32px] w-full max-w-lg mx-auto shadow-2xl relative animate-in slide-in-from-bottom duration-300 max-h-[90vh] flex flex-col" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto my-3 shrink-0" />
                                <div className="px-6 pb-4 border-b border-slate-50 flex justify-between items-center">
                                    <div>
                                        <h2 className="text-xl font-black text-slate-900 leading-none">{selectedDay.date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', weekday: 'long' })}</h2>
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Daily Schedule</p>
                                    </div>
                                    <div className="flex items-center gap-2"><button onClick={() => goToAdjacentDay(-1)} className="p-2 bg-slate-100 rounded-full text-slate-400 disabled:opacity-30" disabled={selectedDayIndex <= 0}><Icon name="ChevronLeft" size={18} /></button><button onClick={() => goToAdjacentDay(1)} className="p-2 bg-slate-100 rounded-full text-slate-400 disabled:opacity-30" disabled={selectedDayIndex === days.length - 1}><Icon name="ChevronRight" size={18} /></button></div><button onClick={() => setSelectedDay(null)} className="p-2 bg-slate-100 rounded-full text-slate-400"><Icon name="X" size={18} /></button>
                                </div>
                                <div className="p-5 space-y-3 overflow-y-auto">
                                    {selectedDay.data?.flights?.map((f, i) => (
                                        <button key={i} onClick={() => setSelectedDetail(f)} className="w-full flex items-center gap-4 p-4 bg-blue-50/50 rounded-2xl text-left">
                                            <div className="bg-blue-600 text-white p-2.5 rounded-xl"><Icon name="Plane" size={20} /></div>
                                            <div className="flex-1 min-w-0"><p className="text-[10px] font-black text-blue-600 uppercase">Flight</p><p className="font-bold truncate">{f.title}</p></div>
                                            <Icon name="ChevronRight" size={18} className="text-blue-300" />
                                        </button>
                                    ))}
                                   {selectedDay.data?.trains?.map((t, i) => (
                                        <button key={i} onClick={() => setSelectedDetail(t)} className="w-full flex items-center gap-4 p-4 bg-blue-50/50 rounded-2xl text-left">
                                        <div className="bg-blue-600 text-white p-2.5 rounded-xl"><Icon name="TrainFront" size={20} /></div>
                                        <div className="flex-1 min-w-0"><p className="text-[10px] font-black text-blue-600 uppercase">Train</p><p className="font-bold truncate">{t.title}</p></div>
                                        <Icon name="ChevronRight" size={18} className="text-blue-300" />
                                        </button>
                                        ))}

                                    {selectedDay.data?.hotel && (
                                        <button onClick={() => setSelectedDetail(selectedDay.data.hotel)} className="w-full flex items-center gap-4 p-4 bg-orange-50/50 rounded-2xl text-left">
                                            <div className="bg-orange-600 text-white p-2.5 rounded-xl"><Icon name="Hotel" size={20} /></div>
                                            <div className="flex-1 min-w-0"><p className="text-[10px] font-black text-orange-600 uppercase">Stay</p><p className="font-bold truncate">{selectedDay.data.hotel.title}</p></div>
                                            <Icon name="ChevronRight" size={18} className="text-orange-300" />
                                        </button>
                                    )}
                                    {selectedDay.data?.activity && (
                                        <button onClick={() => setSelectedDetail(selectedDay.data.activity)} className="w-full flex items-center gap-4 p-4 bg-emerald-50/50 rounded-2xl text-left">
                                            <div className="bg-emerald-600 text-white p-2.5 rounded-xl"><Icon name="MapPin" size={20} /></div>
                                            <div className="flex-1 min-w-0"><p className="text-[10px] font-black text-emerald-600 uppercase">Explore</p><p className="font-bold truncate">{selectedDay.data.activity.title}</p></div>
                                            <Icon name="ChevronRight" size={18} className="text-emerald-300" />
                                        </button>
                                    )}

                  {selectedDay.data?.tips?.length > 0 && (
                    <div className="w-full p-4 bg-indigo-50/60 rounded-2xl text-left border border-indigo-100">
                      <div className="flex items-center gap-3 mb-2">
                        <div className="bg-indigo-600 text-white p-2.5 rounded-xl"><Icon name="Lightbulb" size={20} /></div>
                        <div className="flex-1 min-w-0">
                          <p className="text-[10px] font-black text-indigo-600 uppercase">Tips</p>
                          <p className="font-bold truncate">Helpful reminders for today</p>
                        </div>
                      </div>
                      <ul className="list-disc pl-5 space-y-1 text-sm text-slate-700 font-medium">
                        {selectedDay.data?.tips.map((tip, i) => (
                          <li key={i}>{tip}</li>
                        ))}
                      </ul>
                    </div>
                  )}

                                </div>
                                <div className="pb-8 px-5"><button onClick={() => setSelectedDay(null)} className="w-full py-4 bg-indigo-950 text-white font-black rounded-2xl uppercase tracking-widest text-sm">Close</button></div>
                            </div>
                        </div>
                    )}

                    {/* Detail View Full Screen */}
                    {selectedDetail && (
                        <div className="fixed inset-0 bg-white z-[60] flex flex-col animate-in slide-in-from-right duration-300 overflow-y-auto pb-safe">
                            <div className="px-6 pt-12 pb-6 flex items-center gap-4 border-b border-slate-50">
                                <button onClick={() => setSelectedDetail(null)} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="X" size={24} className="text-slate-900" /></button>
                                <h2 className="text-lg font-black tracking-tight">{selectedDetail.type} Detail</h2>
                            </div>
                            <div className="p-6">
                                <div className={`inline-flex p-4 rounded-3xl text-white mb-6 shadow-2xl ${ (selectedDetail.type === 'Flight' || selectedDetail.type === 'Train') ? 'bg-blue-600' : selectedDetail.type === 'Hotel' ? 'bg-orange-600' : 'bg-emerald-600'}`}>
                                    <Icon name={selectedDetail.type === 'Flight' ? 'Plane' : selectedDetail.type === 'Train' ? 'TrainFront' : selectedDetail.type === 'Hotel' ? 'Hotel' : 'MapPin'} size={32} />
                                    </div>
                                <h1 className="text-3xl font-black text-slate-900 mb-2 leading-tight">{selectedDetail.title}</h1>
                                {selectedDetail.location && <div className="flex items-center gap-2 text-indigo-600 font-black text-sm uppercase mb-8"><Icon name="MapPin" size={16} />{selectedDetail.location}</div>}
                                <div className="space-y-4">
                                    {selectedDetail.details.map((item, idx) => (
                                        <div key={idx} className="bg-slate-50 border border-slate-100 p-5 rounded-3xl">
                                            {item.label && <span className="inline-block bg-white text-indigo-600 text-[10px] font-black px-2 py-1 rounded-lg border border-slate-200 mb-2 uppercase">{item.label}</span>}
                                            <p className="text-slate-700 text-sm font-medium">{typeof item === 'string' ? item : item.text}</p>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setSelectedDetail(null)} className="w-full mt-10 py-5 bg-indigo-950 text-white font-black rounded-3xl uppercase tracking-widest text-sm shadow-xl">Back to Overview</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
