<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f9fafb; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const startDate = new Date(2026, 2, 30); // March 30, 2026
            const endDate = new Date(2026, 3, 21);   // April 21, 2026

            const days = useMemo(() => {
                const arr = [];
                let current = new Date(startDate);
                while (current <= endDate) {
                    arr.push(new Date(current));
                    current.setDate(current.getDate() + 1);
                }
                return arr;
            }, []);

            // Simplified trip data based on your code
            const getEventForDate = (date) => {
                const day = date.getDate();
                const month = date.getMonth();
                
                if (month === 2 && day === 30) return { title: "Flight: GLA -> LHR -> HND", desc: "Departure from Glasgow. Arrive Tokyo." };
                if (month === 3 && day === 1) return { title: "Shibuya & Sakura", desc: "Meiji Jingu Shrine, Yoyogi Park, Shibuya Crossing." };
                if (month === 3 && day === 15) return { title: "Universal Studios Japan", desc: "Super Nintendo World & Wizarding World." };
                return { title: "Exploring Japan", desc: "Check your local itinerary for details." };
            };

            return (
                <div className="max-w-4xl mx-auto p-6">
                    <header className="mb-10 text-center">
                        <h1 className="text-4xl font-bold text-red-600 mb-2">Japan Trip 2026</h1>
                        <p className="text-gray-600">Your React App is now running on GitHub Pages!</p>
                    </header>

                    <div className="grid gap-4">
                        {days.map((date, idx) => {
                            const event = getEventForDate(date);
                            return (
                                <div key={idx} className="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-500 flex justify-between items-center">
                                    <div>
                                        <span className="text-sm font-bold text-gray-400 uppercase">
                                            {date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}
                                        </span>
                                        <h2 className="text-lg font-semibold text-gray-800">{event.title}</h2>
                                        <p className="text-gray-600 text-sm">{event.desc}</p>
                                    </div>
                                    <div className="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500">Day {idx + 1}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
