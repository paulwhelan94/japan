<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trip 2026 Itinerary</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Animation keyframes for the drawer */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .animate-in.fade-in { animation: fadeIn 0.2s ease-out; }
        .animate-in.slide-in-from-bottom { animation: slideUp 0.3s ease-out; }
        .animate-in.slide-in-from-right { animation: slideRight 0.3s ease-out; }
    </style>
</head>
<body class="bg-white md:bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Simple wrapper for Lucide icons in React-lite mode
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const LucideIcon = lucide.icons[name];
                    if (LucideIcon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: LucideIcon },
                            attrs: { strokeWidth: 2.5, width: size, height: size, class: className }
                        });
                    }
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name} className={className} style={{width: size, height: size, display: 'inline-block'}}></i>;
        };

        const App = () => {
            const [selectedDay, setSelectedDay] = useState(null);
            const [selectedDetail, setSelectedDetail] = useState(null);

            const startDate = new Date(2026, 2, 30);
            const endDate = new Date(2026, 3, 21);

            const days = useMemo(() => {
                const arr = [];
                let current = new Date(startDate);
                while (current <= endDate) {
                    arr.push(new Date(current));
                    current.setDate(current.getDate() + 1);
                }
                return arr;
            }, []);

            const tripData = useMemo(() => {
                const data = {};
                const getHotelForDate = (date) => {
                    const month = date.getMonth();
                    const day = date.getDate();
                    if ((month === 2 && day === 31) || (month === 3 && day >= 1 && day < 5)) return { name: "all day place shibuya", price: "£1,446.74", location: "Shibuya, Tokyo" };
                    if (month === 3 && day === 5) return { name: "barhotel Hakone Kazan", price: "£391.74", location: "Hakone" };
                    if (month === 3 && day >= 6 && day < 9) return { name: "Hotel Resol Kyoto Kawaramachi Sanjo", price: "£735.18", location: "Kyoto" };
                    if (month === 3 && day >= 9 && day < 12) return { name: "KIRO Hiroshima", price: "£415.83", location: "Hiroshima" };
                    if (month === 3 && day >= 12 && day < 17) return { name: "The Lively Osaka Honmachi", price: "£657.43", location: "Osaka" };
                    if (month === 3 && day >= 17 && day < 20) return { name: "The Clan Hotel Singapore", price: "£724.19", location: "Singapore" };
                    return null;
                };

                days.forEach((date) => {
                    const dateStr = date.toISOString().split('T')[0];
                    const dayNum = date.getDate();
                    const month = date.getMonth();
                    let flights = null;

                    if (month === 2 && dayNum === 30) {
                        flights = [
                            { type: 'Flight', title: "BA1473: GLA → LHR", details: [{ label: "09:05", text: "Departure from Glasgow. Arrive Heathrow 10:40." }], icon: 'Plane' },
                            { type: 'Flight', title: "BA0005: LHR → HND", details: [{ label: "13:10", text: "Departure from London. Arrive Tokyo 10:55 (+1)." }], icon: 'Plane' }
                        ];
                    } else if (month === 2 && dayNum === 31) {
                        flights = [{type: 'Flight', title: "BA0005: LHR → HND", details: [{ label: "10:55", text: "Arrive in Tokyo at 10:55am." }], icon: 'Plane' }];
                    } else if (month === 3 && dayNum === 17) {
                        flights = [{ type: 'Flight', title: "TR821: KIX → SIN", details: [{ label: "15:50", text: "Fly to Singapore. Arrive 21:25." }], icon: 'Plane' }];
                    } else if (month === 3 && dayNum === 20) {
                        flights = [{ type: 'Flight', title: "BA0016: SIN → LHR", details: [{ label: "22:40", text: "Fly home. Arrive London 05:25 (+1)." }], icon: 'Plane' }];
                    } else if (month === 3 && dayNum === 21) {
                        flights = [{ type: 'Flight', title: "BA1474: LHR → GLA", details: [{ label: "07:05", text: "Final leg. Arrive Glasgow 08:30." }], icon: 'Plane' }];
                    }

                    const hotelInfo = getHotelForDate(date);
                    let activity = null;
                    if (month === 2 && dayNum === 31) activity = { title: "Arrive in Shibuya / Sakura Canal Walk", details: [{ label: "11:00", text: "Arrive Haneda. Transfer to Shibuya hotel." }, { label: "14:00", text: "Explore Miyashita Park adjacent to hotel." }, { label: "18:00", text: "Meguro River Sakura Fubuki and night lights." }], location: "Shibuya / Nakameguro" };
                    else if (month === 3 && dayNum === 1) activity = { title: "Meiju Jingu / Shibuya Sky / Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 2) activity = { title: "teamLab Borderless / TBC", details: [{ label: "10:00", text: "teamLab Borderless at Azabudai Hills." }, { label: "TBC", text: "TBC." }], location: "Azabudai Hills / TBC" };
					else if (month === 3 && dayNum === 3) activity = { title: "Kamakura Day Trip", details: [{ label: "09:00", text: "Train from Shibuya to Kamakura." }, { label: "12:00", text: "Great Buddha & Hase-era Temple." }, { label: "15:00", text: "Dankazura Sakura path to Tsurugaoka Shrine." }], location: "Kamakura" };
					else if (month === 3 && dayNum === 4) activity = { title: "Senso-ji / Imperial Palace / Ginza", details: [{ label: "09:00", text: "Senso-ji Temple and Sumida Park Sakura." }, { label: "13:00", text: "Imperial Palace East Gardens." }, { label: "16:00", text: "Ginza Shopping & Mitsukoshi Depachika." }], location: "Asakusa / Ginza" };
					else if (month === 3 && dayNum === 5) activity = { title: "Hakone Loop", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 6) activity = { title: "Hakone to Kyoto / Nishiki Market / Kiyomizu-dera / Pontocho", 
																		details: [
																			{ label: "10:30", text: "Depart bar hotel Hakone Kazan. Travel via Hakone-Tozan bus and Shinkansen." },
																			{ label: "14:30", text: "Check-in at Hotel Resol Kyoto Kawaramachi Sanjo." },
																			{ label: "15:30", text: "Nishiki Market. Quick visit for street food snacks." },
																			{ label: "16:45", text: "Kiyomizu-dera. Sunset views from the famous wooden stage." },
																			{ label: "18:00", text: "Sannenzaka & Ninenzaka. Evening walk through preserved streets." },
																			{ label: "19:30", text: "Dinner in Pontocho or Gion area." }
																		], 
																		location: "Hakone / Kyoto"};
					else if (month === 3 && dayNum === 7) activity = { title: "Bamboo Forest / % Arabica / 1200 Statues", 
																		details: [
																			{ label: "08:00", text: "Arashiyama Bamboo Forest. Walk the grove before it gets busy." }, 
																			{ label: "09:00", text: "% ARABICA Kyoto Arashiyama. Coffee with a view of Togetsukyo Bridge." }, 
																			{ label: "10:30", text: "Saga-toriimoto preserved street. Historic walk towards the north." }, 
																			{ label: "11:30", text: "Adashino Nenbutsuji Temple. Explore the stone spirits and quiet grove." },
																			{ label: "13:30", text: "Otagi Nenbutsuji Temple. Visit the 1,200 unique stone rakan statues." }
																		], 
																		location: "Arashiyama / Sagano"};
					else if (month === 3 && dayNum === 8) activity = { 
																		title: "Philosopher's Path / Eastern Temples", 
																		details: [
																			{ label: "09:00", text: "Ginkaku-ji (Silver Pavilion). Zen temple and sand gardens." }, 
																			{ label: "10:30", text: "Philosopher's Path. A scenic walk along a cherry tree-lined canal." }, 
																			{ label: "12:30", text: "Eikan-do Temple. Famous for its autumn colors and Buddha statue." }, 
																			{ label: "14:00", text: "Nanzen-ji Temple. Grand Zen complex with a brick aqueduct." },
																			{ label: "15:30", text: "Keage Incline. Historic railway walk near the canal." }], 
																		location: "Higashiyama / Sakyo"};
					else if (month === 3 && dayNum === 9) activity = {
																		title: "Torii Gates / Travel to Hiroshima", 
																		details: [
																			{ label: "07:00", text: "Fushimi Inari Taisha. Early morning hike through the 10,000 torii gates." }, 
																			{ label: "09:30", text: "Return to Hotel / Collect luggage and head to Kyoto Station." }, 
																			{ label: "10:30", text: "Shinkansen to Hiroshima. 1.5-hour journey via Nozomi or Sakura train." }, 
																			{ label: "12:30", text: "Arrival at Hiroshima Station. Lunch and check-in." }], 
																		location: "Kyoto / Hiroshima"};
					else if (month === 3 && dayNum === 10) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 11) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 12) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 13) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 14) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 15) activity = { title: "Universal Studios Japan", details: [{ label: "08:00", text: "Early start at USJ." }, { label: "Priority", text: "Super Nintendo World." }], location: "Osaka" };
					else if (month === 3 && dayNum === 16) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 17) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 18) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
					else if (month === 3 && dayNum === 19) activity = { title: "Shrine, Sky & Sakura", details: [{ label: "08:00", text: "Meiji Jingu Shrine. Walk forest path." }, { label: "10:20", text: "Shibuya Sky (BOOKED)." }, { label: "14:00", text: "Shinjuku Gyoen National Garden." }], location: "Shibuya / Shinjuku" };
                    else if (month === 3 && dayNum === 20) activity = { title: "Universal Studios Japan", details: [{ label: "08:00", text: "Early start at USJ." }, { label: "Priority", text: "Super Nintendo World." }], location: "Osaka" };

                    data[dateStr] = {
                        flights,
                        hotel: hotelInfo ? { type: 'Hotel', title: hotelInfo.name, details: [`Price: ${hotelInfo.price}`], location: hotelInfo.location, icon: 'Hotel' } : null,
                        activity: activity ? { type: 'Activity', ...activity, icon: 'MapPin' } : null
                    };
                });
                return data;
            }, [days]);

            useEffect(() => {
                document.body.style.overflow = (selectedDay || selectedDetail) ? 'hidden' : 'auto';
            }, [selectedDay, selectedDetail]);

            return (
                <div className="min-h-screen pb-safe">
                    <div className="max-w-md mx-auto md:max-w-6xl">
                        <header className="px-5 pt-8 pb-4 bg-white sticky top-0 z-10 md:static">
                            <h1 className="text-2xl font-black tracking-tight text-indigo-950 flex items-center gap-2">
                                <Icon name="Calendar" className="text-indigo-600" size={24} />
                                Trip 2026
                            </h1>
                            <p className="text-slate-400 text-sm font-medium">Japan & Singapore Itinerary</p>
                        </header>

                        <div className="md:p-8 pt-0">
                            <div className="bg-white md:rounded-3xl md:shadow-2xl overflow-hidden md:border border-slate-200">
                                <div className="grid grid-cols-7 bg-indigo-950 text-white text-center py-3 text-[10px] font-black uppercase tracking-widest">
                                    {['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((day, i) => <div key={i}>{day}</div>)}
                                </div>
                                <div className="grid grid-cols-7 border-l border-t border-slate-100">
                                    {days.map((date) => {
                                        const dateStr = date.toISOString().split('T')[0];
                                        const dayData = tripData[dateStr];
                                        return (
                                            <div key={dateStr} onClick={() => setSelectedDay({ date, data: dayData })} className={`min-h-[85px] md:min-h-[120px] p-1.5 border-r border-b border-slate-100 flex flex-col cursor-pointer active:bg-indigo-50 transition-colors ${date.getDay() === 0 || date.getDay() === 6 ? 'bg-slate-50/40' : ''}`}>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className={`text-xs font-black w-6 h-6 flex items-center justify-center rounded-full ${date.getMonth() === 3 ? 'text-indigo-600' : 'text-slate-300'}`}>{date.getDate()}</span>
                                                </div>
                                                <div className="flex flex-wrap gap-0.5 mt-auto">
                                                    {dayData?.flights && <div className="w-2 h-2 rounded-full bg-blue-500" />}
                                                    {dayData?.hotel && <div className="w-2 h-2 rounded-full bg-orange-500" />}
                                                    {dayData?.activity && <div className="w-2 h-2 rounded-full bg-emerald-500" />}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Daily Overview Drawer */}
                    {selectedDay && !selectedDetail && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex flex-col justify-end transition-opacity animate-in fade-in">
                            <div className="absolute inset-0" onClick={() => setSelectedDay(null)} />
                            <div className="bg-white rounded-t-[32px] w-full max-w-lg mx-auto shadow-2xl relative animate-in slide-in-from-bottom duration-300 max-h-[90vh] flex flex-col">
                                <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto my-3 shrink-0" />
                                <div className="px-6 pb-4 border-b border-slate-50 flex justify-between items-center">
                                    <div>
                                        <h2 className="text-xl font-black text-slate-900 leading-none">{selectedDay.date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', weekday: 'long' })}</h2>
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Daily Schedule</p>
                                    </div>
                                    <button onClick={() => setSelectedDay(null)} className="p-2 bg-slate-100 rounded-full text-slate-400"><Icon name="X" size={18} /></button>
                                </div>
                                <div className="p-5 space-y-3 overflow-y-auto">
                                    {selectedDay.data.flights?.map((f, i) => (
                                        <button key={i} onClick={() => setSelectedDetail(f)} className="w-full flex items-center gap-4 p-4 bg-blue-50/50 rounded-2xl text-left">
                                            <div className="bg-blue-600 text-white p-2.5 rounded-xl"><Icon name="Plane" size={20} /></div>
                                            <div className="flex-1 min-w-0"><p className="text-[10px] font-black text-blue-600 uppercase">Flight</p><p className="font-bold truncate">{f.title}</p></div>
                                            <Icon name="ChevronRight" size={18} className="text-blue-300" />
                                        </button>
                                    ))}
                                    {selectedDay.data.hotel && (
                                        <button onClick={() => setSelectedDetail(selectedDay.data.hotel)} className="w-full flex items-center gap-4 p-4 bg-orange-50/50 rounded-2xl text-left">
                                            <div className="bg-orange-600 text-white p-2.5 rounded-xl"><Icon name="Hotel" size={20} /></div>
                                            <div className="flex-1 min-w-0"><p className="text-[10px] font-black text-orange-600 uppercase">Stay</p><p className="font-bold truncate">{selectedDay.data.hotel.title}</p></div>
                                            <Icon name="ChevronRight" size={18} className="text-orange-300" />
                                        </button>
                                    )}
                                    {selectedDay.data.activity && (
                                        <button onClick={() => setSelectedDetail(selectedDay.data.activity)} className="w-full flex items-center gap-4 p-4 bg-emerald-50/50 rounded-2xl text-left">
                                            <div className="bg-emerald-600 text-white p-2.5 rounded-xl"><Icon name="MapPin" size={20} /></div>
                                            <div className="flex-1 min-w-0"><p className="text-[10px] font-black text-emerald-600 uppercase">Explore</p><p className="font-bold truncate">{selectedDay.data.activity.title}</p></div>
                                            <Icon name="ChevronRight" size={18} className="text-emerald-300" />
                                        </button>
                                    )}
                                </div>
                                <div className="pb-8 px-5"><button onClick={() => setSelectedDay(null)} className="w-full py-4 bg-indigo-950 text-white font-black rounded-2xl uppercase tracking-widest text-sm">Close</button></div>
                            </div>
                        </div>
                    )}

                    {/* Detail View Full Screen */}
                    {selectedDetail && (
                        <div className="fixed inset-0 bg-white z-[60] flex flex-col animate-in slide-in-from-right duration-300 overflow-y-auto pb-safe">
                            <div className="px-6 pt-12 pb-6 flex items-center gap-4 border-b border-slate-50">
                                <button onClick={() => setSelectedDetail(null)} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="X" size={24} className="text-slate-900" /></button>
                                <h2 className="text-lg font-black tracking-tight">{selectedDetail.type} Detail</h2>
                            </div>
                            <div className="p-6">
                                <div className={`inline-flex p-4 rounded-3xl text-white mb-6 shadow-2xl ${selectedDetail.type === 'Flight' ? 'bg-blue-600' : selectedDetail.type === 'Hotel' ? 'bg-orange-600' : 'bg-emerald-600'}`}>
                                    <Icon name={selectedDetail.type === 'Flight' ? 'Plane' : selectedDetail.type === 'Hotel' ? 'Hotel' : 'MapPin'} size={32} />
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 mb-2 leading-tight">{selectedDetail.title}</h1>
                                {selectedDetail.location && <div className="flex items-center gap-2 text-indigo-600 font-black text-sm uppercase mb-8"><Icon name="MapPin" size={16} />{selectedDetail.location}</div>}
                                <div className="space-y-4">
                                    {selectedDetail.details.map((item, idx) => (
                                        <div key={idx} className="bg-slate-50 border border-slate-100 p-5 rounded-3xl">
                                            {item.label && <span className="inline-block bg-white text-indigo-600 text-[10px] font-black px-2 py-1 rounded-lg border border-slate-200 mb-2 uppercase">{item.label}</span>}
                                            <p className="text-slate-700 text-sm font-medium">{typeof item === 'string' ? item : item.text}</p>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setSelectedDetail(null)} className="w-full mt-10 py-5 bg-indigo-950 text-white font-black rounded-3xl uppercase tracking-widest text-sm shadow-xl">Back to Overview</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
